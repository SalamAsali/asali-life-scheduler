name: Publish Scheduled Posts

on:
  schedule:
    # 11 AM EDT = 3 PM UTC
    - cron: '0 15 * * *'
    # 5 PM EDT = 9 PM UTC
    - cron: '0 21 * * *'
    # 9 PM EDT = 1 AM UTC (next day)
    - cron: '0 1 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run publisher
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
        run: python publish.py

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Update schedule after publish"
          git push
